<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>CLINE CLASSIC TV | ENDLESS WIDESCREEN V166</title>
    <style>
        body { 
            background: #0a0a0a; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Courier New', Courier, monospace;
        }
        
        #cabinet { 
            width: min(96vw, 1200px); 
            height: min(92vh, 900px); 
            max-width: 100%; 
            max-height: 100%; 
            background: #0f0f0f; /* Restored dark gray-black */
            border: clamp(18px, 4vw, 28px) solid #0a0a0a;
            border-radius: 28px; 
            box-shadow: 0 60px 100px #000, inset 0 0 140px #000; 
            display: flex; 
            flex-direction: column; 
            padding: clamp(20px, 5vw, 50px) clamp(30px, 6vw, 80px); 
            position: relative; 
            overflow: hidden; 
            box-sizing: border-box;
            justify-content: center;
        }

        .glass-tube { 
            width: 100%; 
            height: clamp(50%, 65vh, 75%); /* Restored original flexible ratio */
            background: #000; 
            border-radius: 14px; 
            overflow: hidden; 
            border: clamp(14px, 3vw, 22px) solid #1c1c1c; 
            box-shadow: inset 0 0 90px #000, 0 0 50px #000; 
            display: flex;
            align-items: center; 
            justify-content: center;
            position: relative;
        }

        video, audio { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000; 
        }

        .control-panel {
            width: 100%;
            margin-top: clamp(15px, 4vh, 30px);
            background: #111;
            border: 4px solid #050505;
            border-radius: 10px;
            padding: clamp(10px, 2vw, 20px) clamp(15px, 4vw, 30px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px #000;
        }

        .info-display {
            color: #7aff7a;
            font-size: clamp(12px, 3vw, 18px);
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 5px #00ff00;
            width: 50%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .knob { 
            width: clamp(40px, 10vw, 60px); 
            height: clamp(40px, 10vw, 60px); 
            background: #222; 
            border: 4px solid #050505; 
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 4px 10px #000; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-weight: bold;
            font-size: clamp(12px, 3vw, 16px);
            user-select: none;
            transition: transform 0.1s;
        }

        .knob:active {
            background: #1a1a1a;
            transform: scale(0.95);
        }

        .volume-container { 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider { 
            width: clamp(60px, 15vw, 120px); 
            height: 6px; 
            background: #333; 
            border-radius: 3px; 
            outline: none; 
            accent-color: #7aff7a;
        }

        .fs-toggle { 
            position: absolute; 
            top: clamp(15px, 4vw, 25px); 
            left: clamp(15px, 4vw, 25px); 
            background: #111; 
            color: #7aff7a; 
            border: 1px solid #333; 
            padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 16px); 
            cursor: pointer; 
            font-size: clamp(9px, 2.5vw, 10px); 
            font-weight: bold; 
            border-radius: 8px; 
        }

        .fs-toggle:hover { color: #fff; border-color: #666; }

    </style>
</head>
<body>

<button class="fs-toggle" onclick="toggleFS()">[ FULL SCREEN ]</button>

<div id="cabinet">
    <div class="glass-tube">
        <video id="player" autoplay controls playsinline webkit-playsinline></video>
    </div>

    <div class="control-panel">
        <div class="knob" onclick="playNext(-1)" title="Previous">&lt;&lt;</div>
        
        <div class="info-display" id="title-display">INITIALIZING...</div>

        <div class="volume-container">
            <span style="color:#555; font-size:12px; font-weight:bold;">VOL</span>
            <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volume-knob" oninput="changeVolume(this.value)">
        </div>

        <div class="knob" onclick="playNext(1)" title="Next">&gt;&gt;</div>
    </div>
</div>

<script>
    // The Guaranteed Working Links
    const ST_BASE = "https://archive.org/download/JimmyAndTheFederationGang/";
    const EARTH_BASE = "https://dn710903.ca.archive.org/0/items/How.The.Earth.Was.Made/Season%201/";
    const ISO_BASE = "https://dn711005.ca.archive.org/0/items/InSearchOf16mm/";

    // Combined endless array of all 53 working videos
    const playlist = [
        // In Search Of (10)
        {n: "In Search Of: Martians", u: ISO_BASE + "In Search of... Martians %28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Call From Space", u: ISO_BASE + "In%20Search%20of...A%20Call%20From%20Space%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Amelia Earhart", u: ISO_BASE + "In%20Search%20of...Amelia%20Earhart%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Ancient Aviators", u: ISO_BASE + "In%20Search%20of...Ancient%20Aviators%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Atlantis", u: ISO_BASE + "In%20Search%20of...Atlantis%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Bigfoot", u: ISO_BASE + "In%20Search%20of...Bigfoot%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Earthquakes", u: ISO_BASE + "In%20Search%20of...Earthquakes%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Strange Visitors", u: ISO_BASE + "In%20Search%20of...Strange%20Visitors%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: UFOs", u: ISO_BASE + "In%20Search%20of...UFOs%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},
        {n: "In Search Of: Inca Treasure", u: ISO_BASE + "In%20Search%20of...Inca%20Treasure%20%28480p_30fps_H264-128kbit_AAC%29.mp4"},

        // How the Earth Was Made (13)
        {n: "Earth: San Andreas Fault", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.01of13.San.Andreas.Fault.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: The Deepest Place", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.02of13.The.Deepest.Place.on.Earth.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Krakatoa", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.03of13..Krakatoa.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Loch Ness", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.04of13.Lock.Ness.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: New York", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.05of13.New.York.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Driest Place On Earth", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.06of13.Driest.Place.On.Earth.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Great Lakes", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.07of13.Great.Lakes.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Yellowstone", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.08of13.Yellowstone.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Tsunami", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.09of13.Tsunami.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Asteroids", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.10of13.Asteroids.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Iceland", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.11of13.Iceland.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: Hawaii", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.12of13.Hawaii.XviD.AC3.MVGroup.org.mp4"},
        {n: "Earth: The Alps", u: EARTH_BASE + "History.Ch.How.the.Earth.Was.Made.Complete.Season.1.13of13.The.Alps.XviD.AC3.MVGroup.org.mp4"},

        // Star Trek (30)
        {n: "ST 1x01: The Cage", u: ST_BASE + "1x01-TheCage.mp4"},
        {n: "ST 1x02: Where No Man Has Gone...", u: ST_BASE + "1x02-WhereNoManHasGoneBefore.mp4"},
        {n: "ST 1x03: The Corbomite Maneuver", u: ST_BASE + "1x03-TheCorbomiteManeuver.mp4"},
        {n: "ST 1x04: Mudd's Women", u: ST_BASE + "1x04-MuddsWomen.mp4"},
        {n: "ST 1x05: The Enemy Within", u: ST_BASE + "1x05-TheEnemyWithin.mp4"},
        {n: "ST 1x06: The Man Trap", u: ST_BASE + "1x06-TheManTrap.mp4"},
        {n: "ST 1x07: The Naked Time", u: ST_BASE + "1x07-TheNakedTime.mp4"},
        {n: "ST 1x08: Charlie X", u: ST_BASE + "1x08-CharlieX.mp4"},
        {n: "ST 1x09: Balance of Terror", u: ST_BASE + "1x09-BalanceOfTerror.mp4"},
        {n: "ST 1x10: What are Little Girls...", u: ST_BASE + "1x10-WhatAreLittleGirlsMadeOf.mp4"},
        {n: "ST 1x11: Dagger of the Mind", u: ST_BASE + "1x11-DaggerOfTheMind.mp4"},
        {n: "ST 1x12: Miri", u: ST_BASE + "1x12-Miri.mp4"},
        {n: "ST 1x13: The Conscience of the King", u: ST_BASE + "1x13-TheConscienceOfTheKing.mp4"},
        {n: "ST 1x14: The Galileo Seven", u: ST_BASE + "1x14-TheGalileoSeven.mp4"},
        {n: "ST 1x15: Court Martial", u: ST_BASE + "1x15-CourtMartial.mp4"},
        {n: "ST 1x16: The Menagerie Part I", u: ST_BASE + "1x16-TheMenagerie-PartI.mp4"},
        {n: "ST 1x17: The Menagerie Part II", u: ST_BASE + "1x17-TheMenagerie-PartIi.mp4"},
        {n: "ST 1x18: Shore Leave", u: ST_BASE + "1x18-ShoreLeave.mp4"},
        {n: "ST 1x19: The Squire of Gothos", u: ST_BASE + "1x19-TheSquireOfGothos.mp4"},
        {n: "ST 1x20: Arena", u: ST_BASE + "1x20-Arena.mp4"},
        {n: "ST 1x21: The Alternative Factor", u: ST_BASE + "1x21-TheAlternativeFactor.mp4"},
        {n: "ST 1x22: Tomorrow is Yesterday", u: ST_BASE + "1x22-TomorrowIsYesterday.mp4"},
        {n: "ST 1x23: Return of the Archons", u: ST_BASE + "1x23-TheReturnOfTheArchons.mp4"},
        {n: "ST 1x24: Taste of Armageddon", u: ST_BASE + "1x24-ATasteOfArmageddon.mp4"},
        {n: "ST 1x25: Space Seed", u: ST_BASE + "1x25-SpaceSeed.mp4"},
        {n: "ST 1x26: This Side of Paradise", u: ST_BASE + "1x26-ThisSideOfParadise.mp4"},
        {n: "ST 1x27: Devil in the Dark", u: ST_BASE + "1x27-TheDevilInTheDark.mp4"},
        {n: "ST 1x28: Errand of Mercy", u: ST_BASE + "1x28-ErrandOfMercy.mp4"},
        {n: "ST 1x29: City on the Edge...", u: ST_BASE + "1x29-TheCityOnTheEdgeOfForever.mp4"},
        {n: "ST 1x30: Operation Annihilate!", u: ST_BASE + "1x30-OperationAnnihilate.mp4"}
    ];

    let currentIndex = 0;
    let errorRetryCount = 0;
    const MAX_RETRIES = 4;

    const player = document.getElementById('player');
    const titleDisp = document.getElementById('title-display');
    const volumeKnob = document.getElementById('volume-knob');

    function loadAndPlay() {
        errorRetryCount = 0;
        const item = playlist[currentIndex];
        
        player.pause();
        titleDisp.innerText = item.n + ' [LOADING...]';

        player.src = item.u;
        player.load();
        player.volume = volumeKnob.value;
        player.play().catch(err => {
            console.log("Play blocked:", err);
            titleDisp.innerText = item.n + ' [TAP TO PLAY]';
        });
    }

    function playNext(direction) {
        currentIndex = (currentIndex + direction + playlist.length) % playlist.length;
        loadAndPlay();
    }

    function changeVolume(val) {
        player.volume = val;
    }

    function toggleFS() {
        const elem = document.getElementById('cabinet');
        if (!document.fullscreenElement) {
            elem.requestFullscreen?.() || elem.webkitRequestFullscreen?.() || elem.mozRequestFullScreen?.() || elem.msRequestFullscreen?.();
        } else {
            document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.mozCancelFullScreen?.() || document.msExitFullscreen?.();
        }
    }

    window.onload = () => {
        loadAndPlay();
    };

    // Auto-advance to the next video when finished
    player.addEventListener('ended', () => playNext(1));

    player.addEventListener('playing', () => {
        titleDisp.innerText = playlist[currentIndex].n;
    });

    player.addEventListener('waiting', () => {
        if(!titleDisp.innerText.includes("BUFFERING")) {
            titleDisp.innerText = playlist[currentIndex].n + ' [BUFFERING...]';
        }
    });

    // Internet Archive timeout protection
    player.addEventListener('error', () => {
        if (errorRetryCount < MAX_RETRIES) {
            errorRetryCount++;
            titleDisp.innerText = `WAKING SERVER (${errorRetryCount}/${MAX_RETRIES})...`;
            setTimeout(() => {
                player.load();
                player.play().catch(e => console.log("Retry blocked:", e));
            }, 4000); 
        } else {
            titleDisp.innerText = "SERVER TIMEOUT - SKIPPING";
            setTimeout(() => playNext(1), 2000);
        }
    });

</script>
</body>
</html>
